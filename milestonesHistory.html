<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia Milestonów - Treadmill Quest</title>
    
    <!-- Silnik i konfiguracja motywu -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind-config.js"></script>
    
    <!-- Biblioteki i style -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="font-sans min-h-screen p-6">
    <div class="max-w-md mx-auto">
        <!-- NAGŁÓWEK -->
        <header class="flex justify-between items-center mb-10 px-2">
            <h1 class="text-xl font-black text-brand-primary italic uppercase tracking-wider">Archiwum Triumfów</h1>
            <a href="index.html" class="text-[10px] font-black text-gray-500 hover:text-white uppercase tracking-widest transition-all">
                ← Wróć
            </a>
        </header>

        <!-- LISTA MILESTONÓW -->
        <div id="full-milestone-list" class="space-y-4">
            <div class="flex justify-center py-10">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-primary"></div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        async function loadAllMilestones() {
            try {
                const [workoutsRes, milestonesRes] = await Promise.all([
                    supabaseClient.from('workouts').select('distance'),
                    supabaseClient.from('milestones').select('*').order('target_distance', { ascending: false })
                ]);

                const totalKm = workoutsRes.data.reduce((sum, w) => sum + (w.distance || 0), 0);
                const list = document.getElementById('full-milestone-list');
                list.innerHTML = '';

                milestonesRes.data.forEach(m => {
                    const isAchieved = totalKm >= m.target_distance;
                    const div = document.createElement('div');
                    
                    // Używamy brand-card i dynamicznego obramowania
                    div.className = `p-5 rounded-3xl border transition-all duration-500 flex items-center justify-between 
                        ${isAchieved 
                            ? 'bg-brand-card border-brand-primary/30 shadow-lg shadow-orange-900/10' 
                            : 'bg-brand-card/50 border-gray-800 opacity-40'}`;
                    
                    div.innerHTML = `
                        <div class="flex items-center gap-5">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center text-2xl 
                                ${isAchieved ? 'bg-brand-primary/20' : 'bg-gray-800'}">
                                ${isAchieved ? (m.icon || '🏆') : '🔒'}
                            </div>
                            <div>
                                <p class="text-[10px] font-black ${isAchieved ? 'text-brand-primary' : 'text-gray-600'} uppercase tracking-widest">
                                    ${m.target_distance} km
                                </p>
                                <h3 class="text-lg font-black ${isAchieved ? 'text-white' : 'text-gray-700'} leading-tight">
                                    ${m.name}
                                </h3>
                            </div>
                        </div>
                        ${isAchieved ? `
                            <div class="text-right">
                                <span class="text-[8px] bg-brand-primary text-white px-2 py-1 rounded font-black tracking-tighter">ZDOBYTE</span>
                            </div>
                        ` : ''}
                    `;
                    list.appendChild(div);
                });
            } catch (err) {
                console.error("Błąd ładowania archiwum:", err);
                document.getElementById('full-milestone-list').innerHTML = '<p class="text-center text-red-500">Błąd połączenia z kronikami.</p>';
            }
        }
        loadAllMilestones();
    </script>
</body>
</html>
