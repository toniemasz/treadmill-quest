<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treadmill Quest</title>
    
    <!-- Silnik i konfiguracja motywu -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind-config.js"></script>
    
    <!-- Biblioteki i style -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="font-sans min-h-screen p-6">

    <div class="max-w-md mx-auto">
        
        <!-- 1. GŁÓWNY LICZNIK -->
        <section class="bg-brand-card p-6 rounded-3xl border border-gray-800 shadow-2xl mb-12">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Całkowity dystans</p>
                    <h2 class="text-5xl font-black text-white"><span id="total-km">0.0</span> <span class="text-lg text-gray-600 italic">km</span></h2>
                </div>
                <div class="text-right">
                    <p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Cel finałowy</p>
                    <p id="final-goal-text" class="text-xl font-bold text-brand-primary">--- km</p>
                </div>
            </div>

            <div class="bg-gray-800 rounded-full h-4 w-full overflow-hidden p-1">
                <div id="main-progress-bar" class="bg-gradient-to-r from-orange-600 to-orange-400 h-full w-0 rounded-full"></div>
            </div>
        </section>
<section class="mb-12">
    <div class="flex justify-between items-center mb-4 px-2">
        <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Ostatnie punkty trasy</h2>
        <a href="locations.html" class="text-[9px] font-black text-brand-primary border-b border-brand-primary/30 uppercase">Zobacz całą mapę</a>
    </div>
    <div id="recent-locations" class="space-y-2">
        <!-- JS wstrzyknie tu 3 ostatnio zdobyte lokalizacje -->
    </div>
</section>

<section class="bg-brand-card p-3 rounded-2xl border border-brand-primary/20 shadow-lg mb-6 overflow-hidden">
    <div class="marquee-container">
        <div id="marquee-text" class="animate-marquee text-xs font-black text-white uppercase italic tracking-widest">
            📍 Ładowanie aktualnej pozycji na mapie świata... 🌍
        </div>
    </div>
</section>
        <!-- 2. TYTUŁ ŚCIEŻKI -->
        <header class="flex justify-between items-center mb-10 px-2">
            <h1 class="text-xl font-bold text-gray-400 uppercase tracking-tighter">Twoja Ścieżka</h1>
            <span id="current-rank" class="text-[10px] bg-brand-primary/10 text-brand-primary border border-brand-primary/20 px-2 py-1 rounded-full font-bold">ŁADOWANIE RANGI...</span>
        </header>

        <!-- 3. KONTENER ŚCIEŻKI -->
        <div class="relative px-4 min-h-[400px]">
            <div class="absolute left-[38px] top-0 bottom-0 w-1 bg-gray-800 rounded-full"></div>
            <div id="active-line" class="absolute left-[38px] bottom-0 w-1 bg-brand-primary rounded-full" style="height: 0%"></div>
            <div id="milestones-container" class="relative flex flex-col-reverse gap-16">
                <!-- Generowane przez JS -->
            </div>
        </div>

        <!-- NAWIGACJA -->
        <footer class="mt-20 flex justify-center gap-6 border-t border-gray-800 pt-8 text-sm text-gray-500">
            <a href="admin.html" class="hover:text-brand-primary transition-colors">Admin</a>
            <a href="history.html" class="hover:text-brand-primary transition-colors">Historia</a>
            <a href="stats.html" class="hover:text-brand-primary transition-colors">Statystyki</a>
            <a href="milestonesHistory.html" class="hover:text-brand-primary transition-colors">Archiwum</a>
        </footer>
    </div>

    <section class="mt-20 border-t border-gray-800 pt-10 pb-20">
    <h3 class="text-lg font-black text-white uppercase italic mb-4">Masz pomysł na ulepszenie? 💡</h3>
    <div class="bg-gray-800/50 p-4 rounded-2xl border border-gray-700">
        <textarea id="idea-text" placeholder="Np. Dodaj wykres spalonych kalorii..." class="w-full bg-transparent border-none focus:outline-none text-sm text-gray-300 resize-none h-20"></textarea>
        <button onclick="sendIdea()" class="mt-2 w-full bg-gray-700 hover:bg-orange-600 p-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">Wyślij pomysł</button>
    </div>
    </section>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
