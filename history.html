<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia Treningów - Treadmill Quest</title>
    
    <!-- Silnik i konfiguracja motywu -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind-config.js"></script>
    
    <!-- Biblioteki i style -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="font-sans min-h-screen p-6">

    <div class="max-w-md mx-auto">
        
        <!-- NAGŁÓWEK -->
        <header class="flex justify-between items-center py-8 px-2">
            <h1 class="text-xl font-black text-brand-primary italic uppercase tracking-wider">Dziennik Trasy</h1>
            <a href="index.html" class="text-[10px] font-black text-gray-500 hover:text-white uppercase tracking-widest transition-all">
                ← Powrót
            </a>
        </header>

        <!-- STATYSTYKI SUMARYCZNE -->
        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="bg-brand-card p-5 rounded-3xl border border-gray-800 shadow-xl">
                <p class="text-gray-500 text-[9px] uppercase font-bold tracking-widest mb-1">Sesje</p>
                <p id="total-sessions" class="text-3xl font-black text-white">0</p>
            </div>
            <div class="bg-brand-card p-5 rounded-3xl border border-gray-800 shadow-xl">
                <p class="text-gray-500 text-[9px] uppercase font-bold tracking-widest mb-1">Razem</p>
                <p id="sum-km" class="text-3xl font-black text-white">0.0 <span class="text-xs text-gray-600 italic">km</span></p>
            </div>
        </div>

        <!-- LISTA TRENINGÓW -->
        <section>
            <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-6 px-2">Ostatnie aktywności</h2>
            
            <div id="history-list" class="space-y-4">
                <!-- Loader -->
                <div class="flex justify-center py-10">
                    <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-brand-primary"></div>
                </div>
            </div>
        </section>

    </div>

    <!-- SKRYPTY -->
    <script src="config.js"></script>
    <script src="history.js"></script>
</body>
</html>
